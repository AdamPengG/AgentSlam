name: nightly-phase1

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

concurrency:
  group: codex-chatgpt-auth
  cancel-in-progress: false

jobs:
  nightly-phase1:
    runs-on:
      - self-hosted
      - linux
      - agentslam
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run nightly Phase 1 eval
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/ops/nightly_phase1_eval.sh

      - name: Upload nightly outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-phase1-${{ github.run_id }}
          path: |
            reports/nightly/
            reports/triage/
            artifacts/nightly/

